name: Publish relay image to GHCR

# Builds the Mesh relay container image from source (Dockerfile in this repo) and pushes
# it to the GitHub Container Registry. Runs when a release is published, or on demand.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/relay" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            echo "list=${{ steps.img.outputs.image }}:latest,${{ steps.img.outputs.image }}:${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ steps.img.outputs.image }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.title=Mesh Relay
            org.opencontainers.image.description=Self-hosted Mesh relay. Routes end-to-end-encrypted messages; never sees their contents.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
